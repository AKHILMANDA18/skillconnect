<!DOCTYPE html>
<html>
<head>
    <title>SkillConnect</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body {
        background-color: #f5f5f5;
    }

    .card-custom {
        background: white;
        padding: 25px;   /* reduced from 40px */
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    input, select {
        width: 100%;
        padding: 8px;   /* smaller input */
        margin-bottom: 10px;  /* less spacing */
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    .submit-btn {
        background: #1e73ff;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 6px;
        width: 100%;
        font-size: 14px;
    }

    .submit-btn:hover {
        background: #0056d6;
    }

    .login-btn {
        background: #555;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 6px;
        width: 100%;
        margin-top: 8px;
        font-size: 14px;
    }

    h2 {
        font-size: 24px;   /* smaller heading */
        margin-bottom: 20px;
    }
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand text-success" href="#">SkillConnect</a>
    <div>
      <a class="nav-link d-inline text-white" href="#">Home</a>
      <a class="nav-link d-inline text-white" href="#">Jobs</a>
      <a class="nav-link d-inline text-white" href="#">Employers</a>
      <a class="nav-link d-inline text-white" href="{% url 'logout' %}">Logout</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
