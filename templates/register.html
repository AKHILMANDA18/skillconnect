{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card-custom">
            <h2 class="text-center mb-4">Register</h2>

            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}

                <button class="submit-btn" type="submit">
                    Register
                </button>
            </form>

            <a href="{% url 'login' %}">
                <button class="login-btn" type="button">
                    Go to Login
                </button>
            </a>

        </div>
    </div>
</div>

{% endblock %}
